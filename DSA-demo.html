<html>

<head>
    <title>Login demo</title>
    <style>
        #topbar {
            background-color: rgb(85, 85, 85);
            color: white;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 22;
        }

        #login_header {
            width: 468px;
            background-color: gray;
            color: white;
            box-shadow: 0 4px 12px gray;
            padding: 12px 16px;
        }

        #card {
            width: 500px;
            background-color: white;
            box-shadow: 0 4px 12px gray;
        }

        #card_header {
            background-color: orange;
            color: white;
            padding: 12px 16px;
        }

        #card_body {
            background-color: white;
            padding: 16px;
            word-break: break-all;
            overflow-wrap: break-word;
            text-align: left;
        }
    </style>
    <script>
        async function login() {
            document.getElementById("card_body").innerText = '';
            const user = document.getElementById('user').value;
            const pw = document.getElementById('pw').value;
            var algorithm = '';

            if (document.getElementById('ml').checked) {
                algorithm = 'ml';
            } else if (document.getElementById('slh').checked) {
                algorithm = 'slh';
            }

            const res = await fetch('http://127.0.0.1:3000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: user,
                    password: pw,
                    algorithm: algorithm
                })
            });

            const data = await res.json();
            document.getElementById("card_body").innerText = data.signature;
        }

        async function verify() {
            const signature = document.getElementById("card_body").innerText;
            const payload = {
                username: document.getElementById('user').value,
                password: document.getElementById('pw').value
            };

            const res = await fetch('http://127.0.0.1:3000/protected', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    payload: payload,
                    signature: signature
                })
            });

            if (res.status === 200) {
                alert("Verified :)")
            } else {
                alert("Something wrong :(")
            }
        }
    </script>
</head>

<body>
    <header>
        <div id="topbar">
            <b>Post-quantum DSA demo</b>
        </div>
    </header>
    <br>
    <center>
        <table cellspacing="40">
            <tr valign="top">
                <td align="center">
                    <div id="login_header">
                        <b>Login</b>
                    </div>
                    <br>
                    <br>
                    <table>
                        <tr>
                            <td>
                                Username:
                            </td>
                            <td>
                                <input type="text" id="user" value="admin">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                Password:
                            </td>
                            <td>
                                <input type="text" id="pw" value="123456">
                            </td>
                        </tr>
                        <tr>
                            <td valign="top">
                                Encrypt algorithm:
                            </td>
                            <td align="right">
                                ML-DSA <input type="radio" name="algorithm" id="ml" checked="true">
                                <br>
                                SLH-DSA <input type="radio" name="algorithm" id="slh"> 
                            </td>
                        </tr>
                        <tr>
                            <td></td>
                            <td align="right">
                                <button onclick="login()">Login</button>
                            </td>
                        </tr>
                    </table>
                </td>
                <td align="center">
                    <div id="card">
                        <div id="card_header">
                            <b>Signature</b>
                        </div>
                        <div id="card_body" contenteditable="true">

                        </div>
                    </div>
                    <br>
                    <button onclick="verify()">Verify</button>
                </td>
            </tr>
        </table>
    </center>
</body>

</html>
